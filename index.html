<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome, Princess</title>
  
  <!-- Google Fonts for handwriting script, elegant serif, and clean sans-serif -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #dbe4ee;
      --card-bg: #e1e3cb;
      --navy: #1b305b;
      --green: #2e6f40;
      --red: #a83232;
      --text-muted: #6e7c9c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      transition: background-color 0.5s ease;
    }

    body.blackout {
      background-color: #000000 !important;
    }

    /* Scattered background flowers (Page 1 reference) */
    .bg-flower {
      position: absolute;
      width: 250px;
      height: 250px;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      opacity: 0.85;
      transition: transform 1s ease, opacity 1s ease;
    }

    .bg-flower.top-right {
      top: -40px;
      right: -40px;
      transform: rotate(15deg);
    }

    .bg-flower.bottom-left {
      bottom: -30px;
      left: -35px;
      transform: rotate(-10deg);
    }

    .bg-flower.bottom-right {
      bottom: -40px;
      right: -30px;
      transform: rotate(45deg);
    }

    .bg-flower.top-left {
      top: -30px;
      left: -40px;
      transform: rotate(-35deg);
    }

    /* Main Passcode Card Container */
    .card-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      perspective: 1000px;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .card {
      background-color: var(--card-bg);
      width: 100%;
      padding: 40px 30px 45px 30px;
      box-shadow: 0 15px 35px rgba(27, 48, 91, 0.15);
      clip-path: url(#paper-edge);
      -webkit-clip-path: url(#paper-edge);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }

    /* Lock Icon */
    .lock-container {
      width: 80px;
      height: 95px;
      border: 3.5px solid var(--navy);
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
      color: var(--navy);
      background-color: rgba(27, 48, 91, 0.03);
    }

    .lock-container svg {
      width: 38px;
      height: 38px;
    }

    /* Welcome Header */
    .welcome-title {
      font-family: 'Great Vibes', cursive;
      font-size: 3.1rem;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 2px;
      font-weight: normal;
    }

    .welcome-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--navy);
      opacity: 0.8;
      margin-bottom: 30px;
    }

    /* Passcode Dot Indicators */
    .dots-container {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      height: 16px;
      align-items: center;
    }

    .dot {
      width: 12px;
      height: 12px;
      border: 2px solid var(--navy);
      border-radius: 50%;
      transition: background-color 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  border-color 0.25s ease, 
                  transform 0.25s ease;
    }

    .dot.filled {
      background-color: var(--green);
      border-color: var(--green);
      transform: scale(1.2);
    }

    .dot.error {
      background-color: var(--red);
      border-color: var(--red);
      transform: scale(1.1);
    }

    /* Shake animation for wrong code */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .shake {
      animation: shake 0.4s ease-in-out;
    }

    /* Feedback Status Text */
    .status-text {
      height: 25px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      margin-bottom: 25px;
      transition: opacity 0.3s ease;
      font-weight: 500;
    }

    .status-text.correct {
      color: var(--green);
    }

    .status-text.error {
      color: var(--red);
    }

    /* Keypad Grid styling */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px 25px;
      width: 100%;
      max-width: 280px;
    }

    .key {
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.65rem;
      font-family: 'Playfair Display', serif;
      color: var(--navy);
      cursor: pointer;
      border-radius: 18px;
      transition: background-color 0.15s ease, transform 0.1s ease;
      position: relative;
      background: transparent;
      outline: none;
      border: none;
    }

    /* Key click highlight effect */
    .key:active {
      background-color: rgba(27, 48, 91, 0.08);
      transform: scale(0.92);
    }

    /* Key hover state for desktop */
    @media (hover: hover) {
      .key:hover {
        background-color: rgba(27, 48, 91, 0.04);
      }
    }

    .key.empty {
      cursor: default;
      pointer-events: none;
    }

    .key svg {
      width: 24px;
      height: 24px;
      stroke: var(--navy);
    }

    /* SVG mask path definition (Page 1 card edge reference) */
    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
    }

    /* FLOWER TRANSITION LAYER */
    .transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 100;
      display: flex;
    }

    .flower-panel {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      overflow: hidden;
      transition: width 2.5s cubic-bezier(0.25, 1, 0.5, 1);
      background: transparent;
    }

    .flower-panel-left {
      left: 0;
    }

    .flower-panel-right {
      right: 0;
    }

    .flower-panel-inner {
      width: 55vw;
      height: 100vh;
      position: absolute;
      top: 0;
      background: transparent;
      overflow: hidden;
    }

    .flower-panel-left .flower-panel-inner {
      right: 0;
    }

    .flower-panel-right .flower-panel-inner {
      left: 0;
    }

    /* Flowery items inside panels */
    .transition-flower {
      position: absolute;
      object-fit: contain;
      transform: scale(0) rotate(0deg);
      opacity: 0;
      transition: transform 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.2), 
                  opacity 2.2s ease-out;
    }

    /* Phase 1: Growth */
    body.phase-grow .flower-panel-left,
    body.phase-grow .flower-panel-right {
      width: 55vw;
      pointer-events: auto;
    }

    body.phase-grow .transition-flower {
      transform: scale(1) rotate(var(--rot));
      opacity: 1;
    }

    body.phase-grow .card-wrapper,
    body.phase-retreat .card-wrapper {
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }

    body.phase-grow .bg-flower,
    body.phase-retreat .bg-flower {
      opacity: 0;
      transform: scale(0.5);
    }

    /* Phase 2: Retreat / Comeback */
    body.phase-retreat .flower-panel-left,
    body.phase-retreat .flower-panel-right {
      width: 0;
      transition: width 2s cubic-bezier(0.7, 0, 0.3, 1);
    }

    body.phase-retreat .transition-flower {
      transform: scale(0) rotate(0deg);
      opacity: 0;
      transition: transform 1.8s cubic-bezier(0.7, 0, 0.3, 1), opacity 1.5s ease;
    }
  </style>
</head>
<body>

  <!-- Hidden SVG defining the clip path for the wavy paper-like edge of the card -->
  <svg class="svg-defs" width="0" height="0">
    <defs>
      <clipPath id="paper-edge" clipPathUnits="objectBoundingBox">
        <path d="M 0, 0.04 
                 C 0.05, 0.02, 0.1, 0.05, 0.15, 0.035 
                 C 0.2, 0.02, 0.25, 0.05, 0.3, 0.035 
                 C 0.35, 0.02, 0.4, 0.05, 0.45, 0.035 
                 C 0.5, 0.02, 0.55, 0.05, 0.6, 0.035 
                 C 0.65, 0.02, 0.7, 0.05, 0.75, 0.035 
                 C 0.8, 0.02, 0.85, 0.05, 0.9, 0.035 
                 C 0.95, 0.02, 1, 0.04, 1, 0.04 
                 L 1, 0.96 
                 C 0.95, 0.98, 0.9, 0.95, 0.85, 0.965 
                 C 0.8, 0.98, 0.75, 0.95, 0.7, 0.965 
                 C 0.65, 0.98, 0.6, 0.95, 0.55, 0.965 
                 C 0.5, 0.98, 0.45, 0.95, 0.4, 0.965 
                 C 0.35, 0.98, 0.3, 0.95, 0.25, 0.965 
                 C 0.2, 0.98, 0.15, 0.95, 0.1, 0.965 
                 C 0.05, 0.98, 0, 0.96, 0, 0.96 
                 Z" />
      </clipPath>
    </defs>
  </svg>

  <!-- Background Corner Flowers (Initial Page 1 style) -->
  <img src="flowers/blue_lisianthus.webp" class="bg-flower top-right" alt="Flower">
  <img src="flowers/blue_aster.webp" class="bg-flower bottom-left" alt="Flower">
  <img src="flowers/purple_lily.webp" class="bg-flower bottom-right" alt="Flower">
  <img src="flowers/purple_begonia.webp" class="bg-flower top-left" alt="Flower">

  <!-- Main Passcode Card -->
  <div class="card-wrapper" id="cardWrapper">
    <div class="card" id="lockCard">
      
      <!-- Lock Header -->
      <div class="lock-container">
        <!-- SVG Lock Icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>

      <h1 class="welcome-title">Welcome, Princess</h1>
      <p class="welcome-subtitle">a little secret...</p>

      <!-- Dots Indicators -->
      <div class="dots-container" id="dotsContainer">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Feedback/Status message -->
      <div class="status-text" id="statusText"></div>

      <!-- Numeric Keypad Grid -->
      <div class="keypad" id="keypad">
        <button class="key" data-val="1">1</button>
        <button class="key" data-val="2">2</button>
        <button class="key" data-val="3">3</button>
        <button class="key" data-val="4">4</button>
        <button class="key" data-val="5">5</button>
        <button class="key" data-val="6">6</button>
        <button class="key" data-val="7">7</button>
        <button class="key" data-val="8">8</button>
        <button class="key" data-val="9">9</button>
        <div class="key empty"></div>
        <button class="key" data-val="0">0</button>
        <button class="key" data-val="back">
          <!-- Backspace Icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Growing and Parting Flowers overlay -->
  <div class="transition-overlay">
    <div class="flower-panel flower-panel-left" id="panelLeft">
      <div class="flower-panel-inner" id="innerLeft"></div>
    </div>
    <div class="flower-panel flower-panel-right" id="panelRight">
      <div class="flower-panel-inner" id="innerRight"></div>
    </div>
  </div>

  <script>
    const CORRECT_CODE = "2106";
    let currentInput = "";
    let isProcessing = false;

    const dots = document.querySelectorAll('.dot');
    const statusText = document.getElementById('statusText');
    const lockCard = document.getElementById('lockCard');
    const body = document.body;

    // A selection of beautiful flower filenames from the flowers folder to build the screen-covering curtain
    const flowerImages = [
      'purple_lily.webp', 'purple_agapanthus.webp', 'purple_alstroemeria.webp', 'purple_azalea.webp',
      'purple_begonia.webp', 'purple_bougainvillea.webp', 'purple_larkspur.webp',
      'blue_lisianthus.webp', 'blue_lily.webp', 'blue_aster.webp', 'blue_lotus.webp', 'blue_star.webp',
      'bluebell.webp', 'pink_lily.webp', 'pink_aster.webp', 'pink_begonia.webp', 'pink_bluebell.webp',
      'red_amaryllis.webp', 'red_anemone.webp', 'red_aster.webp', 'red_azalea.webp', 'red_begonia.webp',
      'red_bougainvillea.webp', 'white_lily.webp', 'yellow_lily.webp'
    ];

    // Build the flower panels programmatically with random properties (Page 4 to 8 effect)
    function generateFlowerCurtains() {
      const innerLeft = document.getElementById('innerLeft');
      const innerRight = document.getElementById('innerRight');

      const density = 80; // number of flowers per side to guarantee complete covering

      // Helper to generate coordinates and random scaling/rotations
      function spawnFlowers(container, side) {
        for (let i = 0; i < density; i++) {
          const img = document.createElement('img');
          const flowerFile = flowerImages[Math.floor(Math.random() * flowerImages.length)];
          img.src = `flowers/${flowerFile}`;
          img.classList.add('transition-flower');

          // Distribute along the edge and center with larger size
          const size = Math.floor(Math.random() * 200) + 220; // 220px to 420px
          const rot = Math.floor(Math.random() * 360) - 180; // -180deg to 180deg

          // Position flowers: Y distributed evenly (from -10% to 110% vertical height)
          const yPos = (i / density) * 120 - 10;
          
          // Distribute X across the panel width (-20% to 120%) to ensure massive overlapping
          const xPos = Math.random() * 140 - 20;

          img.style.width = `${size}px`;
          img.style.height = `${size}px`;
          img.style.top = `${yPos}vh`;
          img.style.left = `${xPos}%`;
          img.style.setProperty('--rot', `${rot}deg`);
          
          // Delayed stagger on transitions
          const delay = Math.random() * 1.5; // Staggered entry over 1.5s
          img.style.transitionDelay = `${delay}s, ${delay}s`;

          container.appendChild(img);
        }
      }

      spawnFlowers(innerLeft, 'left');
      spawnFlowers(innerRight, 'right');
    }

    // Initialize key events and buttons
    document.getElementById('keypad').addEventListener('click', (e) => {
      const button = e.target.closest('.key');
      if (!button || isProcessing) return;

      const value = button.getAttribute('data-val');
      if (!value) return;

      playClickHighlight(button);

      if (value === 'back') {
        if (currentInput.length > 0) {
          currentInput = currentInput.slice(0, -1);
          updateDots();
          clearStatus();
        }
      } else {
        if (currentInput.length < 4) {
          currentInput += value;
          updateDots();
          clearStatus();
          
          if (currentInput.length === 4) {
            checkPasscode();
          }
        }
      }
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (isProcessing) return;
      if (e.key >= '0' && e.key <= '9') {
        if (currentInput.length < 4) {
          currentInput += e.key;
          updateDots();
          clearStatus();
          // Find keypad button and trigger highlight visual
          const btn = document.querySelector(`.key[data-val="${e.key}"]`);
          if (btn) playClickHighlight(btn);

          if (currentInput.length === 4) {
            checkPasscode();
          }
        }
      } else if (e.key === 'Backspace') {
        if (currentInput.length > 0) {
          currentInput = currentInput.slice(0, -1);
          updateDots();
          clearStatus();
          const btn = document.querySelector('.key[data-val="back"]');
          if (btn) playClickHighlight(btn);
        }
      }
    });

    function playClickHighlight(button) {
      button.style.backgroundColor = 'rgba(27, 48, 91, 0.12)';
      setTimeout(() => {
        button.style.backgroundColor = '';
      }, 150);
    }

    function updateDots() {
      dots.forEach((dot, index) => {
        if (index < currentInput.length) {
          dot.classList.add('filled');
        } else {
          dot.classList.remove('filled');
        }
      });
    }

    function clearStatus() {
      statusText.textContent = "";
      statusText.className = "status-text";
      dots.forEach(dot => dot.classList.remove('error'));
    }

    function checkPasscode() {
      if (currentInput === CORRECT_CODE) {
        handleSuccess();
      } else {
        handleFailure();
      }
    }

    function handleSuccess() {
      isProcessing = true;
      statusText.textContent = "Correct";
      statusText.className = "status-text correct";

      // Match transition sequence from PDF (Page 2 -> Page 3 -> Page 4 -> Page 11 -> Page 13)
      setTimeout(() => {
        statusText.textContent = "Opening...";
      }, 550);

      setTimeout(() => {
        // Trigger Phase 1: Flowers grow and cover screen (Page 4 to 10)
        body.classList.add('phase-grow');
      }, 1000);

      // Phase 2: After screen is fully covered, switch background to black and retreat flowers back to edges
      setTimeout(() => {
        body.classList.add('blackout');
        body.classList.remove('phase-grow');
        body.classList.add('phase-retreat');
      }, 3600); // 1s wait + 2.5s grow transition + small margin

      // Final transition redirect
      setTimeout(() => {
        window.location.href = 'page2.html';
      }, 5500);
    }

    function handleFailure() {
      isProcessing = true;
      statusText.textContent = "Incorrect Code";
      statusText.className = "status-text error";
      
      dots.forEach(dot => {
        dot.classList.add('error');
      });

      lockCard.classList.add('shake');

      setTimeout(() => {
        lockCard.classList.remove('shake');
        currentInput = "";
        updateDots();
        isProcessing = false;
      }, 800);
    }

    // Initialize flowery curtain nodes
    window.addEventListener('DOMContentLoaded', generateFlowerCurtains);
  </script>
</body>
</html>
